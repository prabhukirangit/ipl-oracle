version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ipl-oracle-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      APP_HOST: "0.0.0.0"
      APP_PORT: "8000"
      APP_ENV: "production"
      FRONTEND_URL: "http://localhost"
    volumes:
      - backend_data:/app/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    depends_on:
      - ollama  # optional: remove if not using local LLM

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ipl-oracle-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy

  # -----------------------------------------------------------------------
  # Ollama — fully offline LLM (optional, remove if using cloud providers)
  # For CPU-only: remove the entire 'deploy' block below.
  # -----------------------------------------------------------------------
  ollama:
    image: ollama/ollama:latest
    container_name: ipl-oracle-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    # GPU passthrough — remove this block for CPU-only machines
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

volumes:
  backend_data:
  ollama_models:
